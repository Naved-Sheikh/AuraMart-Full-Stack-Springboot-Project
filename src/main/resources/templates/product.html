<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Aura Mart | Shop</title>
<style>
    /* Fixed Image Sizing */
    .product-img {
        width: 100%;
        height: 160px;
        object-fit: contain;
    }
    .product-card {
        transition: transform 0.2s ease;
        border: 1px solid #eee !important;
    }
    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px rgba(0,0,0,0.1) !important;
    }
</style>
</head>
<body>
	<section>
		<div class="container-fluid bg-black py-4 py-md-5 mt-5">
			<div class="row">
				<div class="col-12 col-md-8 offset-md-2">
					<form action="/products" method="get">
						<div class="input-group px-2">
							<input type="text" class="form-control rounded-start" name="ch" placeholder="Search for products...">
							<button class="btn btn-warning text-dark px-4">
								<i class="fa-solid fa-magnifying-glass"></i> <span class="d-none d-md-inline">Search</span>
							</button>
						</div>
					</form>
				</div>
			</div>
		</div>

		<div class="container-fluid mt-4">
			<div class="row px-md-3">

				<div class="col-12 col-md-2 mb-4">
					<div class="card shadow-sm border-0">
						<div class="card-body p-0">
							<div class="list-group list-group-flush">
								<p class="fs-5 p-3 mb-0 fw-bold border-bottom">Categories</p>
								<a href="/products"
									th:classappend="${paramValue=='' or paramValue==null} ? 'active bg-dark border-dark':''"
									class="list-group-item list-group-item-action"> All </a> 
                                    
                                <a th:each="c:${categories}"
									th:href="@{'/products?category='+${c.name}}"
									th:classappend="${paramValue == c.name} ? 'active bg-dark border-dark':''"
									class="list-group-item list-group-item-action">[[${c.name}]]</a>
							</div>
						</div>
					</div>
				</div>

				<div class="col-12 col-md-10">
					<div class="card shadow-sm border-0 mb-5">
						<div class="card-body">
							<p class="fs-3 text-center fw-bold">Our Products</p>
							<div class="row g-3"> <th:block th:if="${productsSize > 0}">
									<div class="col-6 col-md-3" th:each="p:${products}">
										<div class="card h-100 product-card shadow-sm">
											<div class="card-body p-2 p-md-3 text-center">
                                               <img alt="product" th:src="${p.image}" style="width: 100%; height: 200px; object-fit: contain !important;" class="mb-2 p-3">
												
                                                <p class="fs-6 fw-bold text-truncate mb-1">[[${p.title}]]</p>
												
												<div class="mb-2">
													<span class="fs-6 fw-bold">₹[[${p.discountPrice}]]</span><br>
													<span class="text-decoration-line-through text-muted small">₹[[${p.price}]]</span> 
                                                    <span class="text-success small fw-bold">[[${p.discount}]]% off</span>
												</div>
                                                
												<a th:href="@{'/product/'+${p.id}}"
													class="btn btn-dark btn-sm w-100 rounded-pill">Details</a>
											</div>
										</div>
									</div>
								</th:block>
                                
								<th:block th:unless="${productsSize > 0}">
									<div class="col-12 text-center py-5">
                                        <i class="fa-solid fa-box-open fs-1 text-muted mb-3"></i>
                                        <p class="fs-4 text-danger">No products found in this category.</p>
                                    </div>
								</th:block>
							</div>
						</div>
					</div>

					<div class="row align-items-center mb-5 px-2">
						<div class="col-12 col-md-4 text-center text-md-start mb-3 mb-md-0">
                            <span class="badge bg-secondary">Total Elements: [[${totalElements}]]</span>
                        </div>
						<div class="col-12 col-md-8">
							<th:block th:if="${productsSize > 0}">
								<nav aria-label="Page navigation">
									<ul class="pagination justify-content-center justify-content-md-end mb-0">
										<li class="page-item" th:classappend="${isFirst} ? 'disabled':''">
                                            <a class="page-link" th:href="@{'/products?pageNo='+${pageNo-1}}" aria-label="Previous">
                                                <span aria-hidden="true">&laquo;</span>
                                            </a>
                                        </li>

										<li th:each="i : ${#numbers.sequence(1, totalPages)}"
											class="page-item" th:classappend="${pageNo+1 == i} ? 'active':''">
                                            <a class="page-link" th:href="@{'/products?pageNo='+${i-1}}">[[${i}]]</a>
                                        </li>

										<li class="page-item" th:classappend="${isLast} ? 'disabled':''">
                                            <a class="page-link" th:href="@{'/products?pageNo='+${pageNo+1}}" aria-label="Next">
                                                <span aria-hidden="true">&raquo;</span>
                                            </a>
                                        </li>
									</ul>
								</nav>
							</th:block>
						</div>
					</div>

				</div>
			</div>
		</div>
	</section>
</body>
</html>
