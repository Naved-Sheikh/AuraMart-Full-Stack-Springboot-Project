<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>My Profile | AuraMart</title>
</head>
<body>
	<section>
		<div class="py-5 px-3" style="background-color: #f4f7f6; min-height: 100vh;">
			<div class="container">
				
				<div class="d-flex justify-content-between align-items-center mb-4 animate-slide-down">
					<a href="/admin/" class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold shadow-sm action-btn">
						<i class="fa-solid fa-arrow-left me-2"></i> Dashboard
					</a>
				</div>

				<div class="text-center mb-5 animate-slide-down">
					<h2 class="fw-bold text-dark mb-1">My <span class="text-warning">Profile</span></h2>
					<p class="text-muted small text-uppercase fw-semibold tracking-wider">Manage Your Account Details</p>
					<div class="mx-auto" style="width: 50px; height: 3px; background-color: #ffc107; border-radius: 10px;"></div>
				</div>

				<div class="row justify-content-center mb-4 input-anim">
					<div class="col-lg-10">
						<th:block th:if="${session.succMsg}">
							<div class="alert alert-success d-flex align-items-center mb-3 border-0 shadow-sm rounded-3">
								<i class="fa-solid fa-circle-check fs-5 me-3 text-success"></i>
								<div class="fw-semibold text-success small">[[${session.succMsg}]]</div>
							</div>
							<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<th:block th:if="${session.errorMsg}">
							<div class="alert alert-danger d-flex align-items-center mb-3 border-0 shadow-sm rounded-3">
								<i class="fa-solid fa-circle-exclamation fs-5 me-3 text-danger"></i>
								<div class="fw-semibold text-danger small">[[${session.errorMsg}]]</div>
							</div>
							<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>
					</div>
				</div>

				<div class="row justify-content-center">
					
					<div class="col-lg-4 mb-4 input-anim" style="animation-delay: 0.1s;">
						<div class="premium-white-card h-100 text-center">
							<div class="position-relative d-inline-block mt-3 mb-4">
								<img th:src="@{'../img/profile_img/'+${user.profileImage}}" class="rounded-circle shadow-sm border border-3 border-white" style="width: 130px; height: 130px; object-fit: cover;">
								<span class="position-absolute bottom-0 end-0 p-2 bg-success border border-light rounded-circle text-white shadow" title="Active Account"></span>
							</div>
							<h4 class="fw-bold text-dark mb-1">[[${user.name}]]</h4>
							<p class="text-muted mb-3"><i class="fa-solid fa-envelope me-2 text-warning"></i>[[${user.email}]]</p>
							
							<div class="d-flex justify-content-center gap-2 mb-4">
								<span class="badge bg-dark text-white px-3 py-2 rounded-pill"><i class="fa-solid fa-user-shield me-2 text-warning"></i>[[${user.role}]]</span>
								<span class="badge bg-success-subtle text-success border border-success px-3 py-2 rounded-pill">Status: [[${user.isEnable}]]</span>
							</div>
						</div>
					</div>

					<div class="col-lg-6 mb-4 input-anim" style="animation-delay: 0.2s;">
						<div class="premium-white-card mb-4">
							<h5 class="fw-bold text-dark mb-4 border-bottom pb-3"><i class="fa-solid fa-user-pen text-warning me-2"></i>Edit Information</h5>
							
							<form action="/admin/update-profile" method="post" enctype="multipart/form-data">
								<input type="hidden" th:value="${user.id}" name="id">
								
								<div class="row g-3 mb-3">
									<div class="col-md-6">
										<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-user me-2 text-warning"></i>Full Name</label>
										<input type="text" name="name" class="form-control premium-input" th:value="${user.name}" required>
									</div>
									<div class="col-md-6">
										<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-phone me-2 text-warning"></i>Mobile Number</label>
										<input type="text" name="mobileNumber" class="form-control premium-input" th:value="${user.mobileNumber}" required>
									</div>
								</div>

								<div class="mb-3">
									<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-map-location-dot me-2 text-warning"></i>Street Address</label>
									<input type="text" name="address" class="form-control premium-input" th:value="${user.address}" required>
								</div>

								<div class="row g-3 mb-4">
									<div class="col-md-4">
										<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-city me-2 text-warning"></i>City</label>
										<input type="text" name="city" class="form-control premium-input" th:value="${user.city}" required>
									</div>
									<div class="col-md-4">
										<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-map me-2 text-warning"></i>State</label>
										<input type="text" name="state" class="form-control premium-input" th:value="${user.state}" required>
									</div>
									<div class="col-md-4">
										<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-thumbtack me-2 text-warning"></i>Pincode</label>
										<input type="text" name="pincode" class="form-control premium-input" th:value="${user.pincode}" required>
									</div>
								</div>

								<div class="mb-4">
									<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-image-portrait me-2 text-warning"></i>Update Profile Image</label>
									<input type="file" name="img" class="form-control premium-input">
								</div>

								<div class="row g-3 mb-4">
									<div class="col-md-4">
										<label class="form-label fw-bold text-muted small">Email Address</label>
										<input type="text" name="" class="form-control premium-input readonly-input" readonly th:value="${user.email}">
									</div>
									<div class="col-md-4">
										<label class="form-label fw-bold text-muted small">Assigned Role</label>
										<input type="text" name="" class="form-control premium-input readonly-input" readonly th:value="${user.role}">
									</div>
									<div class="col-md-4">
										<label class="form-label fw-bold text-muted small">Account Status</label>
										<input type="text" name="" class="form-control premium-input readonly-input" readonly th:value="${user.isEnable}">
									</div>
								</div>

								<button class="btn w-100 py-3 fw-bold fs-6 shadow-sm submit-btn">
									<i class="fa-solid fa-floppy-disk me-2"></i> Save Profile Details
								</button>
							</form>
						</div>

						<div class="premium-white-card input-anim" style="animation-delay: 0.3s;">
							<h5 class="fw-bold text-dark mb-4 border-bottom pb-3"><i class="fa-solid fa-lock text-warning me-2"></i>Security & Password</h5>
							
							<form action="/admin/change-password" method="post">
								<div class="mb-3">
									<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-key me-2 text-warning"></i>Current Password</label>
									<input type="password" name="currentPassword" class="form-control premium-input" required placeholder="Enter current password">
								</div>

								<div class="row g-3 mb-4">
									<div class="col-md-6">
										<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-shield-halved me-2 text-warning"></i>New Password</label>
										<input type="password" name="newPassword" class="form-control premium-input" required placeholder="New password">
									</div>
									<div class="col-md-6">
										<label class="form-label fw-bold text-dark small"><i class="fa-solid fa-circle-check me-2 text-warning"></i>Confirm Password</label>
										<input type="password" name="confirmPassword" class="form-control premium-input" required placeholder="Confirm new password">
									</div>
								</div>

								<button class="btn w-100 py-3 fw-bold fs-6 shadow-sm btn-dark action-btn">
									<i class="fa-solid fa-shield-cat me-2"></i> Update Password
								</button>
							</form>
						</div>

					</div>
				</div>
			</div>
		</div>

		<style>
			.premium-white-card {
				background: #ffffff;
				border-radius: 20px;
				padding: 30px;
				box-shadow: 0 10px 30px rgba(0,0,0,0.04);
				transition: transform 0.3s ease;
			}

			.premium-white-card:hover {
				transform: translateY(-5px);
				box-shadow: 0 15px 35px rgba(0,0,0,0.08);
			}

			.premium-input {
				background-color: #f8f9fa;
				border: 1px solid #e9ecef;
				border-radius: 12px;
				padding: 10px 16px;
				color: #212529;
				font-weight: 500;
				transition: all 0.3s ease;
			}

			.premium-input:focus {
				background-color: #ffffff;
				border-color: #ffc107;
				box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.15);
				outline: none;
			}

			.readonly-input {
				background-color: #e9ecef !important;
				color: #6c757d !important;
				cursor: not-allowed;
				border-color: #dee2e6;
			}
			
			.readonly-input:focus {
				box-shadow: none !important;
				border-color: #dee2e6 !important;
			}

			.submit-btn {
				background-color: #ffc107;
				color: #000;
				border-radius: 12px;
				border: none;
				transition: all 0.3s ease;
			}

			.submit-btn:hover {
				background-color: #ffca2c;
				transform: translateY(-2px);
				box-shadow: 0 8px 15px rgba(255, 193, 7, 0.2) !important;
			}

			.action-btn { 
				border-radius: 12px; 
				border: none;
				transition: all 0.2s ease; 
			}
			
			.action-btn:hover { 
				transform: translateY(-2px); 
				box-shadow: 0 8px 15px rgba(33, 37, 41, 0.2) !important;
			}

			@keyframes slideDown {
				from { opacity: 0; transform: translateY(-20px); }
				to { opacity: 1; transform: translateY(0); }
			}

			.animate-slide-down { animation: slideDown 0.6s ease-out; }

			@keyframes slideUpFade {
				from { opacity: 0; transform: translateY(20px); }
				to { opacity: 1; transform: translateY(0); }
			}

			.input-anim {
				opacity: 0;
				animation: slideUpFade 0.5s ease forwards;
			}

			@media (max-width: 992px) {
				.premium-white-card {
					padding: 25px 20px;
				}
			}
		</style>
	</section>
</body>
</html>
