<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
	<head>
	<link rel="stylesheet" th:href="@{/css/style.css}">
	</head>
<body>
	<section>
	
	<style>
    .group:hover .category-wrapper {
        transform: scale(1.2) rotate(5deg) !important;
        transition: all 0.3s ease;
    }
    .group:hover img {
        border: 2px solid #ffc107 !important;
        box-shadow: 0 10px 20px rgba(255, 193, 7, 0.4) !important;
    }
    .group:hover p {
        color: #ffc107 !important;
        font-weight: bold;
    }
</style>
	
		<div id="carouselExample" class="carousel slide shadow mb-5 d-none d-md-block" data-bs-ride="carousel">
			<div class="carousel-inner rounded-4">
				<div class="carousel-item active">
					<img src="img/ecom1.png" class="d-block w-100" style="height: 400px; object-fit: cover;">
				</div>
				<div class="carousel-item">
					<img src="img/ecom2.jpg" class="d-block w-100" style="height: 400px; object-fit: cover;">
				</div>
			</div>
		</div>

		<div class="container mb-5">
			<h4 class="text-center fw-bold mb-4">Shop by Category</h4>
			<div class="row g-3 justify-content-center">
				<div class="col-4 col-md-3 col-lg-2 text-center" th:each="c:${category}">
					<a th:href="@{'/products?category='+${c.name}}" class="text-decoration-none group">
						<div class="category-wrapper">
							<img th:src="${c.imageName}" class="img-fluid rounded-circle border shadow-sm p-1 bg-white mb-2" 
								 style="width: 80px; height: 80px; object-fit: cover;">
							<p class="text-dark small fw-semibold">[[${c.name}]]</p>
						</div>
					</a>
				</div>
			</div>
		</div>

		<div class="container mb-5">
			<h4 class="text-center fw-bold mb-4">Latest Products</h4>
			<div class="row g-4">
				<div class="col-6 col-md-4 col-lg-3" th:each="p:${products}">
					<div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden custom-card">
						<div class="p-3 text-center bg-white">
							<img th:src="${p.image}" class="img-fluid" 
								 style="height: 160px; width: 100%; object-fit: contain;">
						</div>
						<div class="card-body p-3 text-center">
							<p class="fw-bold text-dark text-truncate mb-1" style="max-width: 100%;">[[${p.title}]]</p>
							<div class="mb-3">
								<span class="text-success fw-bold fs-5">₹[[${p.discountPrice}]]</span><br>
								<small class="text-muted text-decoration-line-through">₹[[${p.price}]]</small>
							</div>
							<a th:href="@{'/product/'+${p.id}}" class="btn btn-dark btn-sm rounded-pill px-4 w-100">View Detail</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
