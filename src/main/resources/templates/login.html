<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Sign In | AuraMart</title>
</head>
<body>
<section>
<div class="auth-page-container py-5 px-3 overflow-hidden" style="background-color: #f8f9fa; min-height: 90vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                
                <div class="premium-card p-4 p-md-5 aura-slide-in-left" id="authCard">
                    
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark mb-1">Aura<span style="color: #ff9800;">Mart</span></h2>
                        <p class="text-muted small fw-bold text-uppercase tracking-wider">Secure Access Portal</p>
                    </div>

                    <th:block th:if="${param.error}">
                        <div class="alert alert-danger border-0 small py-2 mb-4 text-center rounded-3">
                            Authentication Failed: Invalid credentials.
                        </div>
                    </th:block>

                    <form action="/login" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Registered Email</label>
                            <input type="email" name="username" class="form-control aura-input" placeholder="Enter your email address" required>
                        </div>

                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <label class="form-label small fw-bold text-secondary">Security Key</label>
                                <a href="/forgot-password" class="text-decoration-none small fw-bold" style="color: #ff9800;">Forgot password?</a>
                            </div>
                            <input type="password" name="password" class="form-control aura-input" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-dark-aura w-100 py-2 fw-bold mt-3">
                            Authenticate
                        </button>
                    </form>

                    <div class="text-center my-4">
                        <span class="small text-muted bg-white px-2 position-relative" style="z-index: 1;">OR</span>
                        <hr class="mt-n2 opacity-25" style="margin-top: -10px;">
                    </div>

                    <a th:href="@{/oauth2/authorization/google}" class="btn google-btn w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" width="18">
                        Sign in with Google
                    </a>

                    <div class="text-center mt-4 pt-2 border-top">
                        <p class="small text-muted mb-0">
                            New to the platform? <a href="/register" class="fw-bold text-decoration-none transition-link" style="color: #ff9800;">Create Account</a>
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Premium Minimal Styling */
    .premium-card { background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #eee; }
    .aura-input { background: #fdfdfd; border: 1.5px solid #ececec; border-radius: 10px; padding: 10px 15px; transition: 0.3s; }
    .aura-input:focus { border-color: #ff9800; box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.1); outline: none; }
    
    .btn-dark-aura { background: #000; color: #fff; border-radius: 10px; border: none; transition: 0.3s; }
    .btn-dark-aura:hover { transform: translateY(-2px); background: #222; }
    
    .google-btn { background: #fff; border: 1.5px solid #ececec; color: #444; border-radius: 10px; font-weight: 600; text-decoration: none; transition: 0.3s; }
    .google-btn:hover { background: #f9f9f9; transform: translateY(-2px); }

    /* Animation Logic */
    .aura-slide-in-left { animation: slideInLeft 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .aura-slide-out-left { animation: slideOutLeft 0.4s ease-in forwards !important; }

    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-100px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideOutLeft { to { opacity: 0; transform: translateX(-100px); } }
</style>

<script>
    // Smooth transition to Registration
    document.querySelector('.transition-link').addEventListener('click', function(e) {
        e.preventDefault();
        const target = this.href;
        document.getElementById('authCard').classList.add('aura-slide-out-left');
        setTimeout(() => window.location.href = target, 350);
    });
</script>
</section>
</body>
</html>
